# back-* 레포용 배포 워크플로우 (caller)
# 실제 배포 로직은 하네스의 deploy-backend.yml (Reusable Workflow)에 정의
# 배포 방식 변경 시 하네스만 수정하면 모든 프로젝트에 자동 반영
name: Deploy Backend

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    uses: __BACK_ORG__/__DEV_REPO__/.github/workflows/deploy-backend.yml@main
    with:
      environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    secrets: inherit
