name: Build & Deploy

on:
  push:
    branches: [main, dev]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── 1. 변경 감지 ──
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      front: ${{ steps.filter.outputs.front }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'apps/back/**'
              - 'docker/Dockerfile.server'
            front:
              - 'apps/front/**'
              - 'docker/Dockerfile.front'

  # ── 2. Server 빌드 & 배포 ──
  deploy-server:
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "DEPLOY_SERVER=${{ secrets.PRD_SERVER_HOST }}" >> $GITHUB_ENV
            echo "DEPLOY_USER=${{ secrets.PRD_SERVER_USER }}" >> $GITHUB_ENV
            echo "DEPLOY_DIR=${{ secrets.PRD_DEPLOY_DIR }}" >> $GITHUB_ENV
            echo "ENV_TAG=production" >> $GITHUB_ENV
          else
            echo "DEPLOY_SERVER=${{ secrets.DEV_SERVER_HOST }}" >> $GITHUB_ENV
            echo "DEPLOY_USER=${{ secrets.DEV_SERVER_USER }}" >> $GITHUB_ENV
            echo "DEPLOY_DIR=${{ secrets.DEV_DEPLOY_DIR }}" >> $GITHUB_ENV
            echo "ENV_TAG=development" >> $GITHUB_ENV
          fi

      - name: Create server .env file
        run: echo "${{ secrets.SERVER_ENV_FILE }}" > apps/back/.env

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile.server \
            -t __PROJECT__-server:${{ github.sha }} \
            -t __PROJECT__-server:latest \
            .

      - name: Save & compress Docker image
        run: |
          docker save __PROJECT__-server:latest | gzip > server-image.tar.gz

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: server-image.tar.gz,docker/docker-compose.yml,docker/docker-compose.${{ env.ENV_TAG == 'production' && 'prod' || 'dev' }}.yml
          target: ${{ env.DEPLOY_DIR }}

      - name: Load image & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.DEPLOY_DIR }}
            docker load -i server-image.tar.gz
            docker compose -f docker/docker-compose.yml -f docker/docker-compose.${{ env.ENV_TAG == 'production' && 'prod' || 'dev' }}.yml up -d server
            rm -f server-image.tar.gz
            echo "Server deployed: ${{ github.sha }}"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for server... ($i/5)"
              sleep 5
            done
            echo "Health check failed"
            exit 1

      - name: Notify Slack (success)
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ *SERVER DEPLOYED* (${{ env.ENV_TAG }})\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }

      - name: Notify Slack (failure)
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ *SERVER DEPLOY FAILED* (${{ env.ENV_TAG }})\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }

  # ── 3. Front 빌드 & 배포 ──
  deploy-front:
    needs: detect-changes
    if: needs.detect-changes.outputs.front == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "DEPLOY_SERVER=${{ secrets.PRD_SERVER_HOST }}" >> $GITHUB_ENV
            echo "DEPLOY_USER=${{ secrets.PRD_SERVER_USER }}" >> $GITHUB_ENV
            echo "DEPLOY_DIR=${{ secrets.PRD_DEPLOY_DIR }}" >> $GITHUB_ENV
            echo "ENV_TAG=production" >> $GITHUB_ENV
          else
            echo "DEPLOY_SERVER=${{ secrets.DEV_SERVER_HOST }}" >> $GITHUB_ENV
            echo "DEPLOY_USER=${{ secrets.DEV_SERVER_USER }}" >> $GITHUB_ENV
            echo "DEPLOY_DIR=${{ secrets.DEV_DEPLOY_DIR }}" >> $GITHUB_ENV
            echo "ENV_TAG=development" >> $GITHUB_ENV
          fi

      - name: Create front .env file
        run: echo "${{ secrets.FRONT_ENV_FILE }}" > apps/front/.env.local

      - name: Build Docker image
        run: |
          docker build \
            -f docker/Dockerfile.front \
            -t __PROJECT__-front:${{ github.sha }} \
            -t __PROJECT__-front:latest \
            .

      - name: Save & compress Docker image
        run: |
          docker save __PROJECT__-front:latest | gzip > front-image.tar.gz

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: front-image.tar.gz,docker/docker-compose.yml,docker/docker-compose.${{ env.ENV_TAG == 'production' && 'prod' || 'dev' }}.yml
          target: ${{ env.DEPLOY_DIR }}

      - name: Load image & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.DEPLOY_DIR }}
            docker load -i front-image.tar.gz
            docker compose -f docker/docker-compose.yml -f docker/docker-compose.${{ env.ENV_TAG == 'production' && 'prod' || 'dev' }}.yml up -d front
            rm -f front-image.tar.gz
            echo "Front deployed: ${{ github.sha }}"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:3000 > /dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for front... ($i/5)"
              sleep 5
            done
            echo "Health check failed"
            exit 1

      - name: Notify Slack (success)
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ *FRONT DEPLOYED* (${{ env.ENV_TAG }})\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }

      - name: Notify Slack (failure)
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ *FRONT DEPLOY FAILED* (${{ env.ENV_TAG }})\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
