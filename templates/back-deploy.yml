# back-{project} 레포용 배포 워크플로우 템플릿
# init-project.sh 에서 __PROJECT__ 플레이스홀더를 치환하여 사용
#
# 이 파일을 back-{project} 레포의 .github/workflows/deploy.yml 로 복사하세요.

name: Deploy Backend

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "DEPLOY_SERVER=${{ secrets.PRD_SERVER_HOST }}" >> $GITHUB_ENV
            echo "DEPLOY_USER=${{ secrets.PRD_SERVER_USER }}" >> $GITHUB_ENV
            echo "DEPLOY_DIR=${{ secrets.PRD_DEPLOY_DIR }}" >> $GITHUB_ENV
            echo "ENV_TAG=production" >> $GITHUB_ENV
          else
            echo "DEPLOY_SERVER=${{ secrets.DEV_SERVER_HOST }}" >> $GITHUB_ENV
            echo "DEPLOY_USER=${{ secrets.DEV_SERVER_USER }}" >> $GITHUB_ENV
            echo "DEPLOY_DIR=${{ secrets.DEV_DEPLOY_DIR }}" >> $GITHUB_ENV
            echo "ENV_TAG=development" >> $GITHUB_ENV
          fi

      # TODO: Infisical 구축 후 아래 블록으로 교체
      # - name: Install Infisical CLI
      #   run: |
      #     curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
      #     sudo apt-get install -y infisical
      #
      # - name: Export env from Infisical
      #   run: |
      #     ENV_NAME=${{ github.ref_name == 'main' && 'prod' || 'dev' }}
      #     infisical export --env=$ENV_NAME --format=dotenv > .env
      #   env:
      #     INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}

      - name: Create .env file
        run: echo "${{ secrets.SERVER_ENV_FILE }}" > .env

      - name: Build Docker image
        run: |
          docker build \
            -t __PROJECT__-back:${{ github.sha }} \
            -t __PROJECT__-back:latest \
            .

      - name: Save & compress Docker image
        run: docker save __PROJECT__-back:latest | gzip > image.tar.gz

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: image.tar.gz
          target: ${{ env.DEPLOY_DIR }}

      - name: Load image & restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.DEPLOY_DIR }}
            docker load -i image.tar.gz
            docker compose up -d --force-recreate
            rm -f image.tar.gz
            echo "Backend deployed: ${{ github.sha }}"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for server... ($i/5)"
              sleep 5
            done
            echo "Health check failed"
            exit 1

      - name: Notify Slack (success)
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ *BACKEND DEPLOYED* (${{ env.ENV_TAG }})\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: `${{ github.sha }}`\nBy: ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }

      - name: Notify Slack (failure)
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ *BACKEND DEPLOY FAILED* (${{ env.ENV_TAG }})\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
