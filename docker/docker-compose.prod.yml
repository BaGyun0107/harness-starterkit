# Production environment overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  server:
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=warn
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    restart: always

  front:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: always

  mysql:
    ports: !reset []  # Do not expose MySQL port in production
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    restart: always
