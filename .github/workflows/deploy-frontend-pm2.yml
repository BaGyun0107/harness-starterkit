# ── Frontend Deploy Workflow (PM2 / Monorepo Direct + Infisical) ──
# dev-{project} 모노레포에서 apps/front/ 변경 시 빌드 → tar.gz → SCP → Shell 직접 배포
# 기존 Jenkins 파이프라인을 GitHub Actions로 전환한 구조
# 모든 시크릿은 Infisical에서 런타임 조회
# GitHub Secrets: INFISICAL_CLIENT_ID / INFISICAL_CLIENT_SECRET 두 개만 사용
#
# ⚠️ 현재 이 워크플로우는 workflow_dispatch(수동 실행)만 활성화되어 있다.
#   - 기본 배포 방식은 deploy-frontend-vercel.yml
#   - PM2 방식으로 전환하려면:
#       1. deploy-frontend-vercel.yml 의 on: push 블록을 주석 처리
#       2. 아래 on: push 블록 주석을 해제
#     (두 워크플로우가 동시에 push로 트리거되지 않도록 주의)
name: Deploy Frontend (PM2)

on:
  # ─── PM2 전환 시 아래 블록 주석 해제 ───
  # push:
  #   branches: [main, dev]
  #   paths:
  #     - 'apps/front/**'
  #     - '.github/workflows/deploy-frontend-pm2.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - production

# 같은 브랜치에 연속 push 시 이전 배포 취소
concurrency:
  group: deploy-frontend-pm2-${{ github.ref }}
  cancel-in-progress: true

env:
  INFISICAL_API_URL: https://env.co-di.com
  INFISICAL_PROJECT_ID: 8c2a354e-1dea-4a0c-bb74-5d249e3580b9
  SHARED_PROJECT_ID: 7b0a2f95-2d6b-4510-a6b7-029b2f8dfe10
  NODE_VERSION: '24'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || (github.ref_name == 'main' && 'production' || 'development') }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | sudo -E bash
          sudo apt-get update && sudo apt-get install -y infisical

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ] || [ "${{ inputs.environment }}" = "production" ]; then
            echo "infisical_env=prod" >> $GITHUB_OUTPUT
            echo "env_file=.env.production" >> $GITHUB_OUTPUT
          else
            echo "infisical_env=dev" >> $GITHUB_OUTPUT
            echo "env_file=.env.development" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate with Infisical
        id: auth
        env:
          CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        run: |
          TOKEN=$(infisical login \
            --method=universal-auth \
            --client-id="$CLIENT_ID" \
            --client-secret="$CLIENT_SECRET" \
            --domain=${{ env.INFISICAL_API_URL }} \
            --plain --silent)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch deploy secrets (FRONT_*)
        id: deploy-secrets
        env:
          INFISICAL_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          get_secret() {
            infisical secrets get "$1" \
              --projectId=${{ env.INFISICAL_PROJECT_ID }} \
              --env=${{ steps.env.outputs.infisical_env }} \
              --path=/frontend/github-actions \
              --plain \
              --domain=${{ env.INFISICAL_API_URL }}
          }

          SERVER_HOST=$(get_secret FRONT_SERVER_HOST)
          SERVER_USER=$(get_secret FRONT_SERVER_USER)
          DEPLOY_DIR=$(get_secret FRONT_DEPLOY_DIR)
          APP_NAME=$(get_secret FRONT_APP_NAME)
          TAR_FILE=$(get_secret FRONT_TAR_FILE)
          SSH_KEY=$(get_secret FRONT_SSH_PRIVATE_KEY)
          # FRONT_APP_TYPE: pm2 (Next.js SSR 등) | static (React SPA 등)
          # 미지정 시 pm2 기본. React SPA 프로젝트는 반드시 static 으로 설정
          APP_TYPE=$(get_secret FRONT_APP_TYPE 2>/dev/null || echo "pm2")

          echo "::add-mask::$SSH_KEY"

          {
            echo "FRONT_SERVER_HOST=$SERVER_HOST"
            echo "FRONT_SERVER_USER=$SERVER_USER"
            echo "FRONT_DEPLOY_DIR=$DEPLOY_DIR"
            echo "FRONT_APP_NAME=$APP_NAME"
            echo "FRONT_TAR_FILE=$TAR_FILE"
            echo "FRONT_APP_TYPE=$APP_TYPE"
          } >> $GITHUB_ENV

          {
            echo "ssh_key<<EOF_SSH_KEY"
            echo "$SSH_KEY"
            echo "EOF_SSH_KEY"
          } >> $GITHUB_OUTPUT

      - name: Fetch Slack secrets (Shared-Secrets)
        id: slack
        env:
          INFISICAL_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          BOT_TOKEN=$(infisical secrets get slack_bot_token \
            --projectId=${{ env.SHARED_PROJECT_ID }} \
            --env=${{ steps.env.outputs.infisical_env }} \
            --path=/slack \
            --plain \
            --domain=${{ env.INFISICAL_API_URL }})
          CHANNEL=$(infisical secrets get slack_channel \
            --projectId=${{ env.SHARED_PROJECT_ID }} \
            --env=${{ steps.env.outputs.infisical_env }} \
            --path=/slack \
            --plain \
            --domain=${{ env.INFISICAL_API_URL }})
          echo "::add-mask::$BOT_TOKEN"
          echo "bot_token=$BOT_TOKEN" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

      - name: Notify Slack (start)
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ steps.slack.outputs.bot_token }}
          payload: |
            {
              "channel": "${{ steps.slack.outputs.channel }}",
              "text": "🚀 *FRONTEND 배포 시작 (PM2)* (${{ steps.env.outputs.infisical_env }})\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: `${{ github.sha }}`\nBy: ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }

      - name: Generate frontend .env file from Infisical
        env:
          INFISICAL_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          infisical export \
            --projectId=${{ env.INFISICAL_PROJECT_ID }} \
            --env=${{ steps.env.outputs.infisical_env }} \
            --path=/frontend \
            --format=dotenv \
            --domain=${{ env.INFISICAL_API_URL }} \
            > apps/front/${{ steps.env.outputs.env_file }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: apps/front/node_modules
          key: ${{ runner.os }}-front-node-${{ hashFiles('apps/front/package-lock.json') }}

      - name: Install dependencies
        working-directory: apps/front
        run: npm ci --ignore-scripts

      - name: Build
        working-directory: apps/front
        run: npm run build

      - name: Compress build artifacts
        working-directory: apps/front
        run: |
          tar -czvf "${FRONT_TAR_FILE}" \
            .next \
            node_modules \
            public \
            "${{ steps.env.outputs.env_file }}" \
            package.json \
            next.config.* \
            ecosystem.config.* 2>/dev/null || true

      - name: Create GitHub Deployment
        id: gh-deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ github.token }}
          environment: ${{ steps.env.outputs.infisical_env }}
          description: Frontend ${{ steps.env.outputs.infisical_env }} deploy (PM2)

      - name: Deploy to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.FRONT_SERVER_HOST }}
          username: ${{ env.FRONT_SERVER_USER }}
          key: ${{ steps.deploy-secrets.outputs.ssh_key }}
          source: apps/front/${{ env.FRONT_TAR_FILE }}
          target: ${{ env.FRONT_DEPLOY_DIR }}
          strip_components: 2
          timeout: 300s

      # 서버에는 범용 ~/server-deploy.sh 스크립트가 한 번만 배치되어 있어야 한다.
      # (harness 의 scripts/server-deploy.sh 를 서버에 scp 한 뒤 실행 권한 부여)
      # 프로젝트/환경별 값은 인자로 전달 → 서버 스크립트 복사/수정 불필요
      # FRONT_APP_TYPE=static 인 경우 PM2 재시작은 건너뛰고 current/ 만 교체 (Nginx가 자동 서빙)
      - name: Run deploy script on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.FRONT_SERVER_HOST }}
          username: ${{ env.FRONT_SERVER_USER }}
          key: ${{ steps.deploy-secrets.outputs.ssh_key }}
          command_timeout: 10m
          envs: FRONT_DEPLOY_DIR,FRONT_TAR_FILE,FRONT_APP_NAME,FRONT_APP_TYPE
          script: |
            ENV="${{ github.ref_name == 'main' && 'production' || 'development' }}"
            sh ~/server-deploy.sh "${FRONT_DEPLOY_DIR}" "${FRONT_TAR_FILE}" "${FRONT_APP_NAME}" "${ENV}" "${FRONT_APP_TYPE}"

      - name: Update GitHub Deployment (success)
        if: success()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.gh-deployment.outputs.deployment_id }}
          state: success

      - name: Update GitHub Deployment (failure)
        if: failure()
        uses: chrnorm/deployment-status@v2
        with:
          token: ${{ github.token }}
          deployment-id: ${{ steps.gh-deployment.outputs.deployment_id }}
          state: failure

      - name: Notify Slack
        if: always()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ steps.slack.outputs.bot_token }}
          payload: |
            {
              "channel": "${{ steps.slack.outputs.channel }}",
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *FRONTEND ${{ job.status }} (PM2)* (${{ steps.env.outputs.infisical_env }})\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: `${{ github.sha }}`\nBy: ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
